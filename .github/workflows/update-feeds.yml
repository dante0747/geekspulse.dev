name: Update Feeds

on:
  schedule:
    # Every 1 hour
    - cron: "0 */1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Fetch and build feed data
        run: npm run build-feed

      - name: Generate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Generate SEO content
        run: node scripts/generate-seo-content.mjs

      - name: Commit updated feed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh feed cache, sitemap, and SEO content [skip ci]"
          file_pattern: "public/*.json sitemap.xml index.html README.md"
          commit_user_name: "GeeksPulse Bot"
          commit_user_email: "bot@geekspulse.dev"
