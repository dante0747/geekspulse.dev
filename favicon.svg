<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GeeksPulse favicon">
  <defs>
    <linearGradient id="panel" x1="10" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#131920"/>
      <stop offset="0.55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#080B10"/>
    </linearGradient>
    <linearGradient id="accent" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7577F0"/>
      <stop offset="1" stop-color="#5B5EEA"/>
    </linearGradient>
  </defs>

  <!-- Transparent outside corners for browser tabs/bookmarks -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#panel)"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="12.5" fill="none" stroke="url(#accent)" stroke-width="3"/>

  <!-- Terminal prompt: developer/news-feed identity without tiny text -->
  <path d="M18 21 L29 32 L18 43" fill="none" stroke="#E6EDF3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pulse: the brand name made visible at favicon size -->
  <path d="M31 40 H36 L40 25 L45 48 L49 36 H54" fill="none" stroke="#3ECF8E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pixel-snapped terminal cursor / live signal dot -->
  <rect x="18" y="48" width="13" height="4" rx="2" fill="#5B5EEA"/>
</svg>
