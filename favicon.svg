<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#080b12"/>
  <!-- Cyan border/glow frame -->
  <rect x="1" y="1" width="30" height="30" fill="#58c8ff" rx="3"/>
  <!-- Inner dark panel -->
  <rect x="2.5" y="2.5" width="27" height="27" fill="#080b12" rx="2"/>
  <!-- GS text -->
  <text
    x="16" y="22"
    text-anchor="middle"
    font-family="Impact, Arial Black, sans-serif"
    font-size="17"
    font-weight="900"
    letter-spacing="1"
    fill="#58c8ff"
  >GP</text>
  <!-- Neon glow layer -->
  <text
    x="16" y="22"
    text-anchor="middle"
    font-family="Impact, Arial Black, sans-serif"
    font-size="16"
    font-weight="900"
    letter-spacing="0.5"
    fill="#58c8ff"
    opacity="0.4"
    filter="url(#glow)"
  >GP</text>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

