<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GeeksPulse favicon">
  <defs>
    <linearGradient id="panel" x1="10" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101520"/>
      <stop offset="0.55" stop-color="#090B11"/>
      <stop offset="1" stop-color="#060810"/>
    </linearGradient>
  </defs>

  <!-- Background panel -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#panel)"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="12.5" fill="none" stroke="#273145" stroke-width="1.5"/>

  <!-- Pulse waveform — lime signal trace -->
  <polyline points="10,32 16,32 20,20 26,44 31,28 36,36 40,32 54,32" fill="none" stroke="#A3FF3F" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Live signal dot — cyan -->
  <circle cx="54" cy="32" r="4" fill="#24D6FF"/>
</svg>
